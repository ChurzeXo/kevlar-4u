name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.4.0)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (explicitly skip private submodule) ──────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: false

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Compile TypeScript ────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 5. Pre-publish leak check ──────────────────────────────────────────
      - name: Verify no Pro code leaks
        run: |
          echo "🔍 Checking for Pro code leaks in dist/..."
          if [ -d "dist/pro" ]; then
            echo "❌ FAIL: dist/pro/ directory found — Pro code would be published!"
            exit 1
          fi
          if [ -d "dist/credential" ]; then
            echo "❌ FAIL: dist/credential/ directory found — Pro code would be published!"
            exit 1
          fi
          # Verify Pro runtime loader still uses dynamic import (not inlined)
          if grep -q "kevlar-pro-runtime" dist/execution/proRuntime.js 2>/dev/null; then
            echo "⚠️  WARNING: static reference to kevlar-pro-runtime in dist/"
          fi
          echo "✅ No Pro code leaks detected"

      # ── 6. Run tests ──────────────────────────────────────────────────────
      - name: Test
        run: npm test

      # ── 7. Extract version from tag (e.g. refs/tags/v1.2.3 → 1.2.3) ────
      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      # ── 8. Bundle release tarball ─────────────────────────────────────────
      - name: Create release tarball
        run: |
          tar -czf kevlar-${{ steps.version.outputs.VERSION }}.tar.gz \
            --exclude="node_modules" \
            dist/ \
            skills/ \
            config/ \
            scripts/ \
            package.json \
            README.md

      # ── 9. Create zip for Windows users ──────────────────────────────────
      - name: Create release zip
        run: |
          zip -r kevlar-${{ steps.version.outputs.VERSION }}.zip \
            dist/ \
            skills/ \
            config/ \
            scripts/ \
            package.json \
            README.md \
            -x "node_modules/*"

      # ── 10. Extract changelog from CHANGELOG.md for current version ─────
      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          # Extract the section for current version from CHANGELOG.md
          # Matches from "## [x.y.z]" to the next "## [" or end of file
          SECTION=$(sed -n "/^## \\[${VERSION}\\]/,/^## \\[/p" CHANGELOG.md | head -n -1)
          if [ -z "$SECTION" ]; then
            echo "⚠️ No CHANGELOG.md entry for v${VERSION}, falling back to git log"
            PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
            if [ -z "$PREV_TAG" ]; then
              SECTION=$(git log --pretty=format:"- %s (%h)" HEAD)
            else
              SECTION=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
            fi
          fi
          echo "$SECTION" > changelog.txt
          echo "📝 Changelog extracted for v${VERSION}"

      # ── 11. Publish GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🛡️ Kevlar ${{ github.event.inputs.tag || github.ref_name }}"
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: changelog.txt
          files: |
            kevlar-${{ steps.version.outputs.VERSION }}.tar.gz
            kevlar-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Optional: publish to npm ─────────────────────────────────────────────
  # Requires NPM_TOKEN secret configured in repo settings
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      # Safety: double-check no Pro code in dist before npm publish
      - name: Verify no Pro leaks in npm package
        run: |
          if [ -d "dist/pro" ] || [ -d "dist/credential" ]; then
            echo "❌ Pro code leak detected! Aborting publish."
            exit 1
          fi
          echo "✅ Package clean — no Pro code"
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
